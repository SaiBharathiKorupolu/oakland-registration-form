<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Admission Form</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #f5f7fb;
      }

      /* HEADER */
      .header {
        background: #0a2540;
        color: white;
        padding: 15px 30px;
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .header img {
        width: 50px;
      }

      .header h2 {
        margin: 0;
      }

      /* CONTAINER */
      .container {
        max-width: 1100px;
        margin: 30px auto;
      }

      /* CARD */
      .card {
        background: white;
        border-radius: 10px;
        padding: 25px;
        margin-bottom: 20px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
      }

      /* SECTION TITLE */
      .section-title {
        font-weight: 600;
        margin-bottom: 15px;
        color: #0a2540;
      }

      /* GRID */
      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }

      .full {
        grid-column: span 2;
      }

      /* INPUT */
      .field {
        display: flex;
        flex-direction: column;
      }

      label {
        font-size: 13px;
        margin-bottom: 5px;
        color: #555;
      }

      input,
      select {
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.2s;
      }

      input:focus,
      select:focus {
        border-color: #0a2540;
      }

      /* PROGRAM */
      .program {
        display: flex;
        gap: 20px;
      }

      /* BUTTON */
      button {
        width: 100%;
        padding: 14px;
        border: none;
        background: #0a2540;
        color: white;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #163d6b;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
